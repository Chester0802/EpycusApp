name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  BUILD_CONFIGURATION: Release

jobs:
  # ── JOB 1: Calidad y análisis de código ──────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore "EpycusApp.csproj"
          dotnet restore "EpycusApp.Tests/EpycusApp.Tests.csproj"

      - name: Format check
        run: dotnet format "EpycusApp.csproj" --verify-no-changes --severity warn || echo "✅ No se requiere formato"

      - name: Build (warnings as errors)
        run: dotnet build "EpycusApp.csproj" --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -warnaserror

      - name: Run unit tests
        run: dotnet test "EpycusApp.Tests/EpycusApp.Tests.csproj" --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal

  # ── JOB 2: Build y publish ──────────────────────────────────────────
  build:
    name: Build & Publish
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "EpycusApp.csproj"

      - name: Build
        run: dotnet build "EpycusApp.csproj" --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Publish
        run: dotnet publish "EpycusApp.csproj" --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epycus-app-publish
          path: ./publish/
          retention-days: 3

  # ── JOB 3: Deploy a VPS (solo push a main/master) ───────────────────
  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    needs: build
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
      VPS_PORT: ${{ secrets.VPS_PORT }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: epycus-app-publish
          path: ./publish

      # Backup del despliegue actual
      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            mkdir -p /var/backups/epycus-web
            if [ -d "${{ env.VPS_APP_PATH}}" ]; then
              tar -czf "/var/backups/epycus-web/backup_${TIMESTAMP}.tar.gz" -C "${{ env.VPS_APP_PATH}}" .
              echo "✅ Backup creado: backup_${TIMESTAMP}.tar.gz"
              # Mantener solo últimos 5 backups
              ls -t /var/backups/epycus-web/*.tar.gz | tail -n +6 | xargs -r rm
            else
              mkdir -p ${{ env.VPS_APP_PATH}}
              echo "📁 Directorio nuevo, sin backup previo"
            fi

      # Transferir nuevos archivos
      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          source: "publish/*"
          target: ${{ env.VPS_APP_PATH }}
          strip_components: 1

      # Aplicar migraciones EF Core
      - name: Apply EF Core migrations
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            cd ${{ env.VPS_APP_PATH }}
            sudo dotnet ef database update --no-build 2>&1 || echo "⚠️ Migraciones no aplicadas (pueden no requerirse)"
            echo "✅ Migraciones ejecutadas"

      # Reinicio seguro + health check HTTP con retry
      - name: Restart service & health check
        uses: appleboy/ssh-action@v1.0.3
        id: restart_service
        continue-on-error: true
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            sudo chown -R www-data:www-data ${{ env.VPS_APP_PATH }}
            sudo systemctl daemon-reload
            sudo systemctl restart epycus-web
            sleep 5
            STATUS=$(sudo systemctl is-active epycus-web)
            if [ "$STATUS" != "active" ]; then
              echo "❌ El servicio no está activo. Estado: $STATUS"
              sudo systemctl status epycus-web --no-pager
              exit 1
            fi
            echo "✅ Servicio epycus-web reiniciado correctamente"

            # HTTP health check con reintentos
            echo "🔍 Verificando health check HTTP..."
            MAX_RETRIES=6
            RETRY_DELAY=5
            HEALTH_URL="https://app.epycus.es/health"
            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Health check OK (HTTP 200)"
                # Aceptamos Healthy o Degraded: Degraded solo indica que una dependencia
                # externa opcional (ej. Gemini) esta caida, no que la app este rota. Exigir
                # "Healthy" a secas bloqueaba TODO deploy futuro mientras esa dependencia
                # siguiera degradada, forzando un rollback automatico permanente.
                HEALTH_JSON=$(curl -s --max-time 10 "$HEALTH_URL" 2>/dev/null)
                if echo "$HEALTH_JSON" | grep -qE '"status":"(Healthy|Degraded)"'; then
                  echo "✅ Health check: status $(echo "$HEALTH_JSON" | grep -o '"status":"[^"]*"')"
                  exit 0
                else
                  echo "⚠️ Health check responde 200 pero status es Unhealthy: $HEALTH_JSON"
                fi
              else
                echo "⏳ Intento $i/$MAX_RETRIES: Health check falló (HTTP $HTTP_CODE), reintentando en ${RETRY_DELAY}s..."
              fi
              if [ $i -lt $MAX_RETRIES ]; then
                sleep $RETRY_DELAY
              fi
            done
            echo "❌ Health check falló tras $MAX_RETRIES intentos"
            exit 1

      # Rollback automático si el health check falla
      - name: Rollback on deploy failure
        if: steps.restart_service.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            echo "⚠️ Deploy falló — iniciando rollback..."
            BACKUP=$(ls -t /var/backups/epycus-web/*.tar.gz | head -1)
            if [ -n "$BACKUP" ] && [ -f "$BACKUP" ]; then
              echo "⏪ Restaurando backup: $(basename $BACKUP)"
              sudo rm -rf ${{ env.VPS_APP_PATH }}/*
              sudo tar -xzf "$BACKUP" -C ${{ env.VPS_APP_PATH }}
              sudo chown -R www-data:www-data ${{ env.VPS_APP_PATH }}
              sudo systemctl daemon-reload
              sudo systemctl restart epycus-web
              sleep 5
              STATUS=$(sudo systemctl is-active epycus-web)
              if [ "$STATUS" = "active" ]; then
                echo "✅ Rollback exitoso — web restaurada a versión anterior"
              else
                echo "❌ Rollback FALLÓ — intervención manual requerida"
                sudo systemctl status epycus-web --no-pager
                exit 1
              fi
            else
              echo "❌ No se encontró backup para rollback — intervención manual requerida"
              exit 1
            fi

      # Notificar resultado final
      - name: Notify deploy result
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            STATUS=$(sudo systemctl is-active epycus-web)
            echo "📦 Estado final del servicio: $STATUS"

  # ── JOB 4: Seguridad y dependencias (solo push a main/master) ────────
  security:
    name: Security Scan
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        uses: gitleaks/gitleaks-action@v2
        with:
          path: ./
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
