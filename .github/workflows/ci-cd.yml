name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  DOTNET_VERSION: '10.0'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "EPYCUS WEB v0.1.slnx"

      - name: Build
        run: dotnet build "EPYCUS WEB v0.1.slnx" -c ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity minimal

      - name: Test
        run: dotnet test "EPYCUS WEB v0.1.slnx" -c ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal

      - name: Publish artifact
        run: |
          PUBLISH_DIR=publish
          dotnet publish "EPYCUS WEB v0.1.csproj" -c ${{ env.BUILD_CONFIGURATION }} -o $PUBLISH_DIR
          zip -r publish.zip $PUBLISH_DIR

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-zip
          path: publish.zip

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-zip

      - name: Deploy via SSH (rsync + systemd)
        if: ${{ secrets.DEPLOY_METHOD == 'ssh' }}
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            TMP=/tmp/deploy_${GITHUB_RUN_ID}
            mkdir -p $TMP
            unzip -o publish.zip -d $TMP
            RELEASE_DIR=/var/www/myapp/releases/$(date +%Y%m%d%H%M%S)
            mkdir -p $RELEASE_DIR
            rsync -az --delete $TMP/ $RELEASE_DIR/
            ln -sfn $RELEASE_DIR /var/www/myapp/current
            systemctl daemon-reload
            systemctl restart myapp.service

      - name: Deploy via Docker
        if: ${{ secrets.DEPLOY_METHOD == 'docker' }}
        env:
          REGISTRY: ${{ secrets.REGISTRY_URL }}
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          IMAGE_NAME=${REGISTRY}/${{ github.repository }}:${IMAGE_TAG}
          docker build -t $IMAGE_NAME .
          echo $IMAGE_NAME
          echo "Pushing image..."
          echo ${{ secrets.REGISTRY_TOKEN }} | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push $IMAGE_NAME
          ssh -o StrictHostKeyChecking=no -i ${{ secrets.SSH_PRIVATE_KEY }} -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'EOF'
            set -e
            docker pull $IMAGE_NAME
            docker stop myapp || true
            docker rm myapp || true
            docker run -d --name myapp --restart=always -p 80:80 $IMAGE_NAME
EOF
