# ============================================================
# Configuración de rotación de logs para journald
# Epycus Web — Debian 13 (Trixie)
# ============================================================
# Instalación:
#   sudo cp deploy/journald-log-rotation.conf /etc/systemd/journald.conf.d/epycus.conf
#   sudo mkdir -p /etc/systemd/journald.conf.d  # si no existe
#   sudo systemctl restart systemd-journald
# ============================================================

[Journal]

# Almacenamiento persistente (escribe en /var/log/journal)
Storage=persistent

# Tamaño máximo total del journal
SystemMaxUse=500M

# Tamaño máximo por archivo individual
SystemMaxFileSize=100M

# Tiempo máximo de retención de logs
MaxRetentionSec=7day

# Comprimir logs después de 2 segundos
Compress=yes

# Sincronizar con disco cada 30 minutos (reduce escritura SSD)
SyncIntervalSec=30min

# Forward a syslog desactivado (evita duplicados)
ForwardToSyslog=no

# Logs de solo nivel warning o superior hacia la consola
ForwardToWall=no
