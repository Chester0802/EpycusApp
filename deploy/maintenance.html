<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epycus — Mantenimiento</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a0a2e 100%);
            color: #e2dff0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 560px; }
        .logo { width: 96px; height: 96px; margin-bottom: 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #a78bfa; }
        .subtitle { font-size: 1.1rem; color: #9ca3af; margin-bottom: 2rem; line-height: 1.6; }
        .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
        .status {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 50px;
            color: #a78bfa;
            font-size: 0.875rem;
            margin-top: 1rem;
        }
        .footer { margin-top: 3rem; font-size: 0.8rem; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Mantenimiento programado</h1>
        <p class="subtitle">
            Estamos realizando mejoras en Epycus para ofrecerte una mejor experiencia.<br>
            Volveremos en breve.
        </p>
        <div class="status">⏳ Estimado: ~15 minutos</div>
        <div class="footer">
            Epycus App &mdash; Salud y Bienestar para tu vida universitaria
        </div>
    </div>
</body>
</html>
