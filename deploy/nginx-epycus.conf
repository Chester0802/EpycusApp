server {
    listen 80;
    server_name app.epycus.es 147.93.119.193;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Página de mantenimiento (503) — se muestra cuando el flag existe
    # o cuando la app no responde (502)
    error_page 502 503 @maintenance;
    location @maintenance {
        root /var/www/maintenance;
        try_files /maintenance.html =503;
    }

    location / {
        # Si existe el flag de mantenimiento, devolver 503
        if (-f /var/www/maintenance/maintenance.flag) {
            return 503;
        }
        proxy_pass http://localhost:5000;
        proxy_intercept_errors on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
        proxy_send_timeout 90;
        client_max_body_size 10M;
    }

    # Cache para archivos estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:5000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
